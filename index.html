<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCM Co-deposition Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    .desc {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      background: #f1f4f8;
      border-radius: 14px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
      border: 1px solid #e0e0e0;
      line-height: 1.7;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
      color: #0b5fff;
      margin-top: 6px;
    }

    .formula {
      font-family: "Times New Roman", serif;
      font-size: 18px;
      background: #fafafa;
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0;
    }

    .note {
      font-size: 13px;
      color: #666;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>QCM Co-deposition Calculator</h1>

    <p class="desc">
      총 목표 두께와 4개의 QCM rate를 입력하면,
      A 툴링 기준 또는 B 툴링 기준에서 각각 몇 nm까지 쌓아야 하는지 계산합니다.
      두께 단위는 nm, rate 단위는 Å/s입니다.
    </p>

    <div class="grid">
      <div>
        <label>총 목표 실제 두께 k (nm)</label>
        <input id="k" type="number" value="20" step="0.01">
      </div>

      <div>
        <label>A-tool 기준에서 보이는 A rate, rAA (Å/s)</label>
        <input id="rAA" type="number" value="1.0" step="0.001">
      </div>

      <div>
        <label>A-tool 기준에서 보이는 B rate, rAB (Å/s)</label>
        <input id="rAB" type="number" value="3.0" step="0.001">
      </div>

      <div>
        <label>B-tool 기준에서 보이는 A rate, rBA (Å/s)</label>
        <input id="rBA" type="number" value="0.333" step="0.001">
      </div>

      <div>
        <label>B-tool 기준에서 보이는 B rate, rBB (Å/s)</label>
        <input id="rBB" type="number" value="1.0" step="0.001">
      </div>
    </div>

    <button onclick="calc()">계산하기</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calc() {
      const k = Number(document.getElementById("k").value);
      const rAA = Number(document.getElementById("rAA").value);
      const rAB = Number(document.getElementById("rAB").value);
      const rBA = Number(document.getElementById("rBA").value);
      const rBB = Number(document.getElementById("rBB").value);

      if ([k, rAA, rAB, rBA, rBB].some(v => isNaN(v) || v <= 0)) {
        document.getElementById("result").innerHTML =
          "<div class='card'>모든 값을 0보다 큰 숫자로 입력해주세요.</div>";
        return;
      }

      const actualRateTotal = rAA + rBB;

      const kA = k * rAA / actualRateTotal;
      const kB = k * rBB / actualRateTotal;

      const ratioA = kA / k * 100;
      const ratioB = kB / k * 100;

      const depositionTime = (10 * k) / actualRateTotal;

      const targetAtool = k * (rAA + rAB) / actualRateTotal;
      const targetBtool = k * (rBA + rBB) / actualRateTotal;

      document.getElementById("result").innerHTML = `
        <div class="card">
          <b>입력 rate 정의</b><br>
          r<sub>AA</sub>: A-tool 기준에서 보이는 A 물질 rate = ${rAA.toFixed(4)} Å/s<br>
          r<sub>AB</sub>: A-tool 기준에서 보이는 B 물질 rate = ${rAB.toFixed(4)} Å/s<br>
          r<sub>BA</sub>: B-tool 기준에서 보이는 A 물질 rate = ${rBA.toFixed(4)} Å/s<br>
          r<sub>BB</sub>: B-tool 기준에서 보이는 B 물질 rate = ${rBB.toFixed(4)} Å/s
        </div>

        <div class="card">
          <b>실제 기판 기준 조성</b>

          <div class="formula">
            k<sub>A</sub> = k × r<sub>AA</sub> / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × ${rAA.toFixed(4)} / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
            = ${kA.toFixed(3)} nm
          </div>

          <div class="formula">
            k<sub>B</sub> = k × r<sub>BB</sub> / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × ${rBB.toFixed(4)} / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
            = ${kB.toFixed(3)} nm
          </div>

          A 물질 비율: <b>${ratioA.toFixed(2)}%</b><br>
          B 물질 비율: <b>${ratioB.toFixed(2)}%</b>
        </div>

        <div class="card">
          <b>1. A-tool 기준으로 QCM을 설정한 경우</b>

          <div class="formula">
            Target<sub>A-tool</sub>
            = k × (r<sub>AA</sub> + r<sub>AB</sub>) / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × (${rAA.toFixed(4)} + ${rAB.toFixed(4)})
            / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
          </div>

          <div class="big">${targetAtool.toFixed(3)} nm</div>

          <span class="note">
            QCM을 A 물질 툴링값으로 설정했다면,
            모니터가 ${targetAtool.toFixed(3)} nm를 표시할 때 셔터를 닫으면 됩니다.
          </span>
        </div>

        <div class="card">
          <b>2. B-tool 기준으로 QCM을 설정한 경우</b>

          <div class="formula">
            Target<sub>B-tool</sub>
            = k × (r<sub>BA</sub> + r<sub>BB</sub>) / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × (${rBA.toFixed(4)} + ${rBB.toFixed(4)})
            / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
          </div>

          <div class="big">${targetBtool.toFixed(3)} nm</div>

          <span class="note">
            QCM을 B 물질 툴링값으로 설정했다면,
            모니터가 ${targetBtool.toFixed(3)} nm를 표시할 때 셔터를 닫으면 됩니다.
          </span>
        </div>

        <div class="card">
          <b>증착 시간</b>

          <div class="formula">
            t = 10k / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = 10 × ${k.toFixed(3)} / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
            = ${depositionTime.toFixed(2)} s
          </div>

          <span class="note">
            실제 두께 k는 nm이고 rate는 Å/s이므로, 1 nm = 10 Å 변환을 적용했습니다.
          </span>
        </div>
      `;
    }

    calc();
  </script>
</body>
</html>
