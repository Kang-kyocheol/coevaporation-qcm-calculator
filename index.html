<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCM Co-deposition Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 960px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    h2 {
      margin-top: 34px;
      font-size: 22px;
      border-top: 1px solid #ddd;
      padding-top: 24px;
    }

    .desc {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    .section-title {
      margin-top: 24px;
      margin-bottom: 8px;
      font-size: 17px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 12px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      background: #f1f4f8;
      border-radius: 14px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
      border: 1px solid #e0e0e0;
      line-height: 1.7;
    }

    .big {
      font-size: 24px;
      font-weight: bold;
      color: #0b5fff;
      margin-top: 6px;
    }

    .formula {
      font-family: "Times New Roman", serif;
      font-size: 18px;
      background: #fafafa;
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0;
    }

    .note {
      font-size: 13px;
      color: #666;
    }

    .material-name {
      color: #0b5fff;
      font-weight: bold;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>QCM Co-deposition Calculator</h1>

    <p class="desc">
      A/B 물질 이름, 총 목표 두께, 4개의 QCM rate를 입력하면
      A-tool 기준 또는 B-tool 기준에서 각각 몇 nm까지 쌓아야 하는지 계산합니다.
      두께 단위는 nm, rate 단위는 Å/s입니다.
    </p>

    <div class="section-title">1. 물질 이름</div>
    <div class="grid">
      <div>
        <label>A 물질 이름</label>
        <input id="nameA" type="text" value="Host">
      </div>

      <div>
        <label>B 물질 이름</label>
        <input id="nameB" type="text" value="Dopant">
      </div>
    </div>

    <div class="section-title">2. 목표 두께</div>
    <div class="grid">
      <div>
        <label>총 목표 실제 두께 k (nm)</label>
        <input id="k" type="number" value="20" step="0.01">
      </div>
    </div>

    <div class="section-title">3. QCM rate 입력</div>
    <div class="grid">
      <div>
        <label>A-tool 기준에서 보이는 A 물질 rate, rAA (Å/s)</label>
        <input id="rAA" type="number" value="1.0" step="0.001">
      </div>

      <div>
        <label>A-tool 기준에서 보이는 B 물질 rate, rAB (Å/s)</label>
        <input id="rAB" type="number" value="3.0" step="0.001">
      </div>

      <div>
        <label>B-tool 기준에서 보이는 A 물질 rate, rBA (Å/s)</label>
        <input id="rBA" type="number" value="0.333" step="0.001">
      </div>

      <div>
        <label>B-tool 기준에서 보이는 B 물질 rate, rBB (Å/s)</label>
        <input id="rBB" type="number" value="1.0" step="0.001">
      </div>
    </div>

    <button onclick="calcMain()">두께 계산하기</button>

    <div class="result" id="result"></div>

    <h2>원하는 조성비로 rate 계산</h2>

    <p class="desc">
      예를 들어 5:1 조성으로 쌓고 싶을 때, 한쪽 rate만 입력하면
      필요한 다른 한쪽 rate를 계산합니다.
    </p>

    <div class="grid">
      <div>
        <label>A 목표 비율</label>
        <input id="ratioA" type="number" value="5" step="0.01">
      </div>

      <div>
        <label>B 목표 비율</label>
        <input id="ratioB" type="number" value="1" step="0.01">
      </div>

      <div>
        <label>기준으로 입력할 물질</label>
        <select id="baseMaterial">
          <option value="A">A 물질 rate를 입력</option>
          <option value="B">B 물질 rate를 입력</option>
        </select>
      </div>

      <div>
        <label>입력한 rate (Å/s)</label>
        <input id="baseRate" type="number" value="1.0" step="0.001">
      </div>
    </div>

    <button onclick="calcRatio()">필요 rate 계산하기</button>

    <div class="result" id="ratioResult"></div>
  </div>

  <script>
    function getNames() {
      const nameA = document.getElementById("nameA").value.trim() || "A 물질";
      const nameB = document.getElementById("nameB").value.trim() || "B 물질";
      return { nameA, nameB };
    }

    function calcMain() {
      const { nameA, nameB } = getNames();

      const k = Number(document.getElementById("k").value);
      const rAA = Number(document.getElementById("rAA").value);
      const rAB = Number(document.getElementById("rAB").value);
      const rBA = Number(document.getElementById("rBA").value);
      const rBB = Number(document.getElementById("rBB").value);

      if ([k, rAA, rAB, rBA, rBB].some(v => isNaN(v) || v <= 0)) {
        document.getElementById("result").innerHTML =
          "<div class='card'>모든 숫자 값을 0보다 크게 입력해주세요.</div>";
        return;
      }

      const actualRateTotal = rAA + rBB;

      const kA = k * rAA / actualRateTotal;
      const kB = k * rBB / actualRateTotal;

      const ratioA = kA / k * 100;
      const ratioB = kB / k * 100;

      const depositionTime = (10 * k) / actualRateTotal;

      const targetAtool = k * (rAA + rAB) / actualRateTotal;
      const targetBtool = k * (rBA + rBB) / actualRateTotal;

      document.getElementById("result").innerHTML = `
        <div class="card">
          <b>입력 rate 정의</b><br>
          r<sub>AA</sub>: A-tool 기준에서 보이는 
          <span class="material-name">${nameA}</span> rate = ${rAA.toFixed(4)} Å/s<br>

          r<sub>AB</sub>: A-tool 기준에서 보이는 
          <span class="material-name">${nameB}</span> rate = ${rAB.toFixed(4)} Å/s<br>

          r<sub>BA</sub>: B-tool 기준에서 보이는 
          <span class="material-name">${nameA}</span> rate = ${rBA.toFixed(4)} Å/s<br>

          r<sub>BB</sub>: B-tool 기준에서 보이는 
          <span class="material-name">${nameB}</span> rate = ${rBB.toFixed(4)} Å/s
        </div>

        <div class="card">
          <b>실제 기판 기준 조성</b>

          <div class="formula">
            k<sub>${nameA}</sub> = k × r<sub>AA</sub> / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × ${rAA.toFixed(4)} / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
            = ${kA.toFixed(3)} nm
          </div>

          <div class="formula">
            k<sub>${nameB}</sub> = k × r<sub>BB</sub> / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × ${rBB.toFixed(4)} / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
            = ${kB.toFixed(3)} nm
          </div>

          <span class="material-name">${nameA}</span> 실제 두께:
          <b>${kA.toFixed(3)} nm</b>
          (${ratioA.toFixed(2)}%)<br>

          <span class="material-name">${nameB}</span> 실제 두께:
          <b>${kB.toFixed(3)} nm</b>
          (${ratioB.toFixed(2)}%)
        </div>

        <div class="card">
          <b>1. ${nameA}-tool 기준으로 QCM을 설정한 경우</b>

          <div class="formula">
            Target<sub>${nameA}-tool</sub>
            = k × (r<sub>AA</sub> + r<sub>AB</sub>) / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × (${rAA.toFixed(4)} + ${rAB.toFixed(4)})
            / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
          </div>

          <div class="big">${targetAtool.toFixed(3)} nm</div>

          <span class="note">
            QCM을 <b>${nameA}</b> 툴링값으로 설정했다면,
            모니터가 <b>${targetAtool.toFixed(3)} nm</b>를 표시할 때 셔터를 닫으면 됩니다.
          </span>
        </div>

        <div class="card">
          <b>2. ${nameB}-tool 기준으로 QCM을 설정한 경우</b>

          <div class="formula">
            Target<sub>${nameB}-tool</sub>
            = k × (r<sub>BA</sub> + r<sub>BB</sub>) / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = ${k.toFixed(3)} × (${rBA.toFixed(4)} + ${rBB.toFixed(4)})
            / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
          </div>

          <div class="big">${targetBtool.toFixed(3)} nm</div>

          <span class="note">
            QCM을 <b>${nameB}</b> 툴링값으로 설정했다면,
            모니터가 <b>${targetBtool.toFixed(3)} nm</b>를 표시할 때 셔터를 닫으면 됩니다.
          </span>
        </div>

        <div class="card">
          <b>증착 시간</b>

          <div class="formula">
            t = 10k / (r<sub>AA</sub> + r<sub>BB</sub>)
          </div>

          <div class="formula">
            = 10 × ${k.toFixed(3)} / (${rAA.toFixed(4)} + ${rBB.toFixed(4)})
            = ${depositionTime.toFixed(2)} s
          </div>

          <span class="note">
            실제 두께 k는 nm이고 rate는 Å/s이므로, 1 nm = 10 Å 변환을 적용했습니다.
          </span>
        </div>
      `;
    }

    function calcRatio() {
      const { nameA, nameB } = getNames();

      const ratioA = Number(document.getElementById("ratioA").value);
      const ratioB = Number(document.getElementById("ratioB").value);
      const baseMaterial = document.getElementById("baseMaterial").value;
      const baseRate = Number(document.getElementById("baseRate").value);

      if ([ratioA, ratioB, baseRate].some(v => isNaN(v) || v <= 0)) {
        document.getElementById("ratioResult").innerHTML =
          "<div class='card'>비율과 rate를 모두 0보다 크게 입력해주세요.</div>";
        return;
      }

      let rateA, rateB;

      if (baseMaterial === "A") {
        rateA = baseRate;
        rateB = baseRate * ratioB / ratioA;
      } else {
        rateB = baseRate;
        rateA = baseRate * ratioA / ratioB;
      }

      const percentA = ratioA / (ratioA + ratioB) * 100;
      const percentB = ratioB / (ratioA + ratioB) * 100;

      document.getElementById("ratioResult").innerHTML = `
        <div class="card">
          <b>목표 조성비</b><br>
          <span class="material-name">${nameA}</span> :
          <span class="material-name">${nameB}</span>
          = ${ratioA} : ${ratioB}<br><br>

          ${nameA} 비율: <b>${percentA.toFixed(2)}%</b><br>
          ${nameB} 비율: <b>${percentB.toFixed(2)}%</b>
        </div>

        <div class="card">
          <b>필요 rate 계산</b>

          <div class="formula">
            r<sub>${nameA}</sub> : r<sub>${nameB}</sub>
            = ${ratioA} : ${ratioB}
          </div>

          ${
            baseMaterial === "A"
              ? `
                <div class="formula">
                  r<sub>${nameB}</sub>
                  = r<sub>${nameA}</sub> × ${ratioB} / ${ratioA}
                </div>

                <div class="formula">
                  = ${baseRate.toFixed(4)} × ${ratioB} / ${ratioA}
                  = ${rateB.toFixed(4)} Å/s
                </div>
              `
              : `
                <div class="formula">
                  r<sub>${nameA}</sub>
                  = r<sub>${nameB}</sub> × ${ratioA} / ${ratioB}
                </div>

                <div class="formula">
                  = ${baseRate.toFixed(4)} × ${ratioA} / ${ratioB}
                  = ${rateA.toFixed(4)} Å/s
                </div>
              `
          }

          <div class="big">
            ${nameA} rate = ${rateA.toFixed(4)} Å/s<br>
            ${nameB} rate = ${rateB.toFixed(4)} Å/s
          </div>

          <span class="note">
            이 rate는 실제 기판 기준 조성비를 맞추기 위한 값입니다.
            장비 화면에서는 선택한 tooling 기준에 따라 표시 rate가 달라질 수 있습니다.
          </span>
        </div>
      `;
    }

    calcMain();
    calcRatio();
  </script>
</body>
</html>
